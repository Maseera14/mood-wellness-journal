version: '3.8'

services:
  backend:
    build: .
    image: maseera7/mood-backend:latest
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/mood-wellness
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build: ./client
    image: maseera7/mood-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data: