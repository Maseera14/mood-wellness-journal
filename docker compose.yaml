version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: mood-wellness-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=mood-wellness
    networks:
      - mood-wellness-network

  # Backend API
  backend:
    build: ./backend
    container_name: mood-wellness-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/mood-wellness
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - mood-wellness-network

  # Frontend
  frontend:
    build: ./frontend
    container_name: mood-wellness-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - mood-wellness-network

networks:
  mood-wellness-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local